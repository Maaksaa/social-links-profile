<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <article class="card">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          alt="photo avatar jessica"
          class="card__author-avatar"
        />
        <p class="card__author-name">Jessica Randall</p>
        <p class="card__author-country">London, United Kingdom</p>
        <p class="card__author-about">"Front-end developer and avid reader."</p>
        <div class="card__container-socials">
          <button class="card__btn-social">
            <a href="#" class="card__link-social">GitHub</a>
          </button>
          <button class="card__btn-social">
            <a href="#" class="card__link-social">Frontend Mentor</a>
          </button>
          <button class="card__btn-social">
            <a href="#" class="card__link-social">LinkedIn</a>
          </button>
          <button class="card__btn-social">
            <a href="#" class="card__link-social">Twitter</a>
          </button>
          <button class="card__btn-social">
            <a href="#" class="card__link-social">Instagram</a>
          </button>
        </div>
      </article>
    </main>
  </body>
</html>
